server:
  host: "0.0.0.0"
  port: 8080

controller:
  host: "0.0.0.0"
  port: 8000

runner:
  id: "edge-0"
  grpc:
    listen: "unix:///tmp/veilsight-runner.sock"
    fallback_tcp: "127.0.0.1:9090"
  public_base_url: "http://localhost:8080"

streaming:
  primary: "webrtc"
  fallback: "mjpeg"
  codec: "h264"
  encoder: "auto"
  bitrate_kbps: 2500
  keyframe_interval_frames: 30

modules:
  detector:
    # "yolox" | future_person_backend
    type: "yolox"
    workers: 4

    yolox:
      variant: "nano"
      param_path: "models/detector/bytetrack_nano.ncnn.param"
      bin_path: "models/detector/bytetrack_nano.ncnn.bin"
      input_w: 1088
      input_h: 608
      score_threshold: 0.35
      nms_threshold: 0.45
      top_k: 300
      class_id: 0
      ncnn_threads: 1
      letterbox: true
      decoded_output: false

  tracker:
    # "demo" | "bytetrack"
    type: "bytetrack"
    demo:
      high_thresh: 0.6
      low_thresh: 0.2
      match_iou_thresh: 0.3
      low_match_iou_thresh: 0.2
      min_hits: 2
      max_missed: 20
    bytetrack:
      high_thresh: 0.45
      low_thresh: 0.2
      new_track_thresh: 0.45
      match_iou_thresh: 0.35
      low_match_iou_thresh: 0.25
      unconfirmed_match_iou_thresh: 0.35
      duplicate_iou_thresh: 0.85
      track_buffer: 100
      min_box_area: 0
      fuse_score: true
      scene_grid:
        enabled: true
        rows: 6
        cols: 8
        association_weight: 0.15
        cell_distance_weight: 0.65
        occupancy_weight: 0.15
        transition_weight: 0.20
        max_extra_cost: 0.30
        occupancy_decay: 0.92
        transition_decay: 0.98
        warmup_frames: 5

  recognizer:
    type: "none"
    workers: 1
    gallery_path: ""
    unknown_threshold: 0.0

metrics:
  enabled: true
  enable_http: true
  enable_ui_payload: true
  log_interval_ms: 5000

