server:
  host: "0.0.0.0"
  port: 8080

controller:
  host: "0.0.0.0"
  port: 8000

runner:
  id: "edge-0"
  grpc:
    listen: "unix:///tmp/veilsight-runner.sock"
    fallback_tcp: "127.0.0.1:9090"
  public_base_url: "http://localhost:8080"

streaming:
  primary: "webrtc"
  fallback: "mjpeg"
  codec: "h264"
  encoder: "auto"
  bitrate_kbps: 2500
  keyframe_interval_frames: 30

modules:
  detector:
    type: "yolox"
    workers: 2
    yolox:
      variant: "nano"
      param_path: "models/detector/bytetrack_nano.ncnn.param"
      bin_path: "models/detector/bytetrack_nano.ncnn.bin"
      input_w: 1088
      input_h: 608
      score_threshold: 0.35
      nms_threshold: 0.45
      top_k: 300
      class_id: 0
      ncnn_threads: 1
      letterbox: true
      decoded_output: false
  tracker:
    type: "bytetrack"
    bytetrack:
      high_thresh: 0.45
      low_thresh: 0.2
      new_track_thresh: 0.45
      match_iou_thresh: 0.35
      low_match_iou_thresh: 0.25
      unconfirmed_match_iou_thresh: 0.35
      duplicate_iou_thresh: 0.85
      track_buffer: 100
      min_box_area: 0.0
      fuse_score: true
      scene_grid:
        enabled: true
        rows: 6
        cols: 8
        association_weight: 0.15
        cell_distance_weight: 0.65
        occupancy_weight: 0.15
        transition_weight: 0.20
        max_extra_cost: 0.30
        occupancy_decay: 0.92
        transition_decay: 0.98
        warmup_frames: 5

streams:
  - id: "rtsp0"
    type: "rtsp"

    rtsp:
      url: "rtsp://rtspstream:iC_SMRxQh3s8d66xv1LBW@zephyr.rtsp.stream/pattern"
      tcp: true
      fps: 25
      latency_ms: 3000

    outputs:
      fps: 25
      profiles:
        inference:
          width: 640
          height: 480
          keep_aspect: true
          interp: "linear"
          format: "BGR"
        ui:
          width: 640
          height: 480
          keep_aspect: true
          interp: "linear"
          jpeg_quality: 75

    replicate:
      count: 2

  - id: "file0"
    type: "file"

    file:
      path: "../../../assets/test.mp4"
      fps: 15

    outputs:
      fps: 15
      profiles:
        inference:
          width: 640
          height: 480
          keep_aspect: true
          interp: "linear"
          format: "BGR"
        ui:
          width: 640
          height: 480
          keep_aspect: true
          interp: "linear"
          jpeg_quality: 75

    replicate:
      count: 2
