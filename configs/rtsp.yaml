server:
  host: "0.0.0.0"
  port: 8080

controller:
  host: "0.0.0.0"
  port: 8000

runner:
  id: "edge-0"
  grpc:
    listen: "unix:///tmp/veilsight-runner.sock"
    fallback_tcp: "127.0.0.1:9090"
  public_base_url: "http://localhost:8080"

streaming:
  primary: "webrtc"
  fallback: "mjpeg"
  codec: "h264"
  encoder: "auto"
  bitrate_kbps: 2500
  keyframe_interval_frames: 30

streams:
  - id: "rtsp0"
    type: "rtsp"

    rtsp:
      url: "rtsp://rtspstream:iC_SMRxQh3s8d66xv1LBW@zephyr.rtsp.stream/pattern"
      tcp: true
      fps: 30
      latency_ms: 1000

    outputs:
      fps: 30
      profiles:
        inference:
          width: 640
          height: 640
          keep_aspect: true
          interp: "linear"
          format: "BGR"
        ui:
          width: 1280
          height: 720
          keep_aspect: true
          interp: "linear"
          jpeg_quality: 75

    replicate:
      count: 2
